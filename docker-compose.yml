# Renewal Voice Bot - Docker Compose
version: '3.8'

services:
  # Agent Service - LiveKit Voice AI Agent
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: renewal-agent
    restart: unless-stopped
    env_file:
      - .env
    # Agent connects outbound to LiveKit Cloud — no inbound port needed
    expose: []
    networks:
      - renewal-network
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend Service - FastAPI REST API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: renewal-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - renewal-data:/app/data
    depends_on:
      - agent
    networks:
      - renewal-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # UI Service - Chainlit Web Interface
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: renewal-ui
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - renewal-network

networks:
  renewal-network:
    driver: bridge

# Volumes for persistent data (optional - add database later)
volumes:
  renewal-data: